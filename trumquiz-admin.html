<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrumQuiz · Adminkonsol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Albert+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117; --bg2:#11161d; --panel:#161b22; --panel2:#1b222c;
  --line:#262d38; --line2:#323a46;
  --ink:#e6edf3; --ink2:#aeb9c6; --ink3:#7c8794;
  --brass:#e0a458; --brass-d:#b9822f;
  --ok:#3fb950; --ok-bg:#0f2417; --ok-l:#56d364;
  --warn:#d29922; --warn-bg:#2a2110; --warn-l:#e3b341;
  --err:#f85149; --err-bg:#2a1416; --err-l:#ff7b72;
  --info:#58a6ff; --info-bg:#0e1b2e;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --ui:"Albert Sans",system-ui,sans-serif;
  --disp:"Bricolage Grotesque","Albert Sans",sans-serif;
  --r:10px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(224,164,88,.08), transparent 60%),
    radial-gradient(900px 500px at -5% 110%, rgba(88,166,255,.06), transparent 55%),
    var(--bg);
  color:var(--ink); font-family:var(--ui); font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:var(--mono)}
a{color:var(--info);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:var(--ui);cursor:pointer}

/* ---------- Topbar ---------- */
header{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  padding:14px 22px;
  background:rgba(13,17,23,.82);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:12px}
.brand .dot{width:11px;height:11px;border-radius:3px;background:var(--brass);box-shadow:0 0 14px var(--brass)}
.brand h1{font-family:var(--disp);font-weight:800;font-size:18px;margin:0;letter-spacing:-.01em}
.brand h1 span{color:var(--brass)}
.brand .sub{font-size:11px;color:var(--ink3);font-family:var(--mono);margin-top:1px}
.spacer{flex:1}
.tbtn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
  padding:8px 13px;border-radius:8px;font-weight:600;font-size:13px;transition:.15s;
}
.tbtn:hover{border-color:var(--brass);color:var(--brass)}
.tbtn.primary{background:var(--brass);border-color:var(--brass);color:#1a1206}
.tbtn.primary:hover{background:var(--brass-d);border-color:var(--brass-d);color:#1a1206}
.tbtn svg{width:15px;height:15px}
.status{font-size:11px;color:var(--ink3);font-family:var(--mono);white-space:nowrap}

/* ---------- Settings drawer ---------- */
#cfg{
  display:none;width:100%;margin-top:4px;
  border:1px solid var(--line);border-radius:var(--r);background:var(--panel);
  padding:14px 16px;
}
#cfg.open{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
#cfg label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:5px;font-weight:700}
#cfg input{
  width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:7px;
  color:var(--ink);padding:8px 10px;font-family:var(--mono);font-size:12px;
}
#cfg input:focus{outline:none;border-color:var(--brass)}
#cfg .hint{font-size:10px;color:var(--ink3);margin-top:4px}

/* ---------- Summary strip ---------- */
.summary{display:flex;gap:12px;flex-wrap:wrap;padding:18px 22px 4px}
.stat{
  flex:1;min-width:140px;background:var(--panel);border:1px solid var(--line);
  border-radius:var(--r);padding:13px 16px;position:relative;overflow:hidden;
}
.stat .n{font-family:var(--disp);font-weight:800;font-size:26px;line-height:1}
.stat .l{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-top:6px;font-weight:600}
.stat.err{border-color:#3a2023}.stat.err .n{color:var(--err-l)}
.stat.warn{border-color:#3a3017}.stat.warn .n{color:var(--warn-l)}
.stat.ok .n{color:var(--ok-l)}
.stat.clickable{cursor:pointer;transition:.15s}
.stat.clickable:hover{border-color:var(--brass)}

/* ---------- Layout ---------- */
.wrap{display:grid;grid-template-columns:320px 1fr;gap:18px;padding:14px 22px 40px;align-items:start}
@media(max-width:880px){.wrap{grid-template-columns:1fr}}

/* ---------- Sidebar ---------- */
aside{position:sticky;top:78px}
.side-tools{display:flex;gap:8px;margin-bottom:10px}
.search{flex:1;position:relative}
.search input{
  width:100%;background:var(--panel);border:1px solid var(--line);border-radius:8px;
  color:var(--ink);padding:9px 11px 9px 32px;font-size:13px;
}
.search input:focus{outline:none;border-color:var(--brass)}
.search svg{position:absolute;left:10px;top:9px;width:15px;height:15px;color:var(--ink3)}
.filt{
  display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
  border-radius:8px;padding:0 11px;font-size:12px;color:var(--ink2);user-select:none;font-weight:600;white-space:nowrap;
}
.filt.active{border-color:var(--err);color:var(--err-l);background:var(--err-bg)}
.qlist{display:flex;flex-direction:column;gap:7px;max-height:calc(100vh - 200px);overflow:auto;padding-right:4px}
.qlist::-webkit-scrollbar{width:8px}.qlist::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
.qcard{
  display:flex;align-items:center;gap:11px;text-align:left;width:100%;
  background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 12px;
  transition:.13s;animation:rise .35s both;
}
.qcard:hover{border-color:var(--line2);transform:translateX(2px)}
.qcard.sel{border-color:var(--brass);background:linear-gradient(90deg,rgba(224,164,88,.10),var(--panel) 60%)}
.qcard .led{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
.led.ok{background:var(--ok);color:var(--ok)}
.led.warn{background:var(--warn);color:var(--warn)}
.led.err{background:var(--err);color:var(--err)}
.qcard .qi{flex:1;min-width:0}
.qcard .qt{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qcard .qid{font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qcard .qmeta{font-size:11px;color:var(--ink3);text-align:right;white-space:nowrap;font-family:var(--mono)}
.qcard .badge{font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;font-family:var(--mono)}
.badge.err{background:var(--err-bg);color:var(--err-l)}
.badge.warn{background:var(--warn-bg);color:var(--warn-l)}

@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- Detail ---------- */
main{min-width:0;min-height:300px}
.empty{
  border:1px dashed var(--line2);border-radius:14px;padding:48px 30px;text-align:center;color:var(--ink3);
  background:var(--panel);
}
.empty h2{font-family:var(--disp);color:var(--ink2);font-weight:700;margin:0 0 8px}
.empty .big{font-size:40px;margin-bottom:14px}
.empty ul{display:inline-block;text-align:left;margin:14px auto 0;color:var(--ink2);font-size:13px;line-height:1.8}
.empty code{font-family:var(--mono);background:var(--bg);padding:1px 6px;border-radius:5px;color:var(--brass);font-size:12px}

.detail{animation:fade .3s both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.dhead{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.dhead h2{font-family:var(--disp);font-weight:800;font-size:24px;margin:0;letter-spacing:-.01em}
.dhead .pill{font-family:var(--mono);font-size:12px;background:var(--bg);border:1px solid var(--line2);
  padding:3px 9px;border-radius:7px;color:var(--brass);align-self:center}
.dlinks{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.dlink{font-size:12px;font-family:var(--mono);color:var(--ink2);border:1px solid var(--line);border-radius:7px;padding:5px 9px;display:inline-flex;gap:6px;align-items:center}
.dlink:hover{border-color:var(--brass);color:var(--brass);text-decoration:none}

.sec{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);margin-top:16px;overflow:hidden}
.sec>.sh{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);background:var(--bg2)}
.sec>.sh h3{font-family:var(--disp);font-weight:700;font-size:15px;margin:0}
.sec>.sh .count{font-family:var(--mono);font-size:11px;color:var(--ink3);background:var(--bg);padding:2px 8px;border-radius:6px;border:1px solid var(--line)}
.sec>.sh .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.sbody{padding:14px 16px}

/* issue list */
.issues{display:flex;flex-direction:column;gap:8px}
.issue{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border-radius:9px;border:1px solid transparent;font-size:13px}
.issue .ic{font-family:var(--mono);font-weight:800;flex:none;width:18px;text-align:center}
.issue.err{background:var(--err-bg);border-color:#3a2023;color:#ffd7d3}.issue.err .ic{color:var(--err-l)}
.issue.warn{background:var(--warn-bg);border-color:#3a3017;color:#f3e2bf}.issue.warn .ic{color:var(--warn-l)}
.issue.info{background:var(--info-bg);border-color:#163051;color:#cfe3ff}.issue.info .ic{color:var(--info)}
.issue.ok{background:var(--ok-bg);border-color:#143420;color:#c8f5d2}.issue.ok .ic{color:var(--ok-l)}
.issue b{color:#fff;font-weight:700}
.issue .src{font-family:var(--mono);font-size:11px;opacity:.7;margin-left:auto;white-space:nowrap}

/* config grid */
.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.kv .item{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:9px 12px}
.kv .k{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-weight:700;display:flex;align-items:center;gap:6px}
.kv .v{font-family:var(--mono);font-size:13px;margin-top:3px;word-break:break-word}
.kv .v.empty{color:var(--ink3);font-style:italic}
.flag{font-size:9px;font-weight:800;padding:1px 5px;border-radius:5px;font-family:var(--mono)}
.flag.err{background:var(--err-bg);color:var(--err-l)}
.flag.warn{background:var(--warn-bg);color:var(--warn-l)}
.flag.ok{background:var(--ok-bg);color:var(--ok-l)}

/* coverage bar */
.cov{position:relative;height:38px;background:var(--bg);border:1px solid var(--line2);border-radius:8px;margin:4px 0 14px;overflow:hidden}
.cov .seg{position:absolute;top:0;bottom:0;border-right:1px solid rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0d1117;overflow:hidden;white-space:nowrap;padding:0 4px}
.cov .tick{position:absolute;top:0;bottom:0;width:1px;background:var(--line2)}
.cov .tlbl{position:absolute;bottom:1px;font-size:8px;color:var(--ink3);font-family:var(--mono);transform:translateX(2px)}
.covnote{font-size:11px;color:var(--ink3);font-family:var(--mono);margin-bottom:6px}

/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);font-weight:700;padding:7px 10px;border-bottom:1px solid var(--line2);white-space:nowrap}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.bad td{background:rgba(248,81,73,.05)}
.tbl tr.warnrow td{background:rgba(210,153,34,.05)}
.tbl .num{font-family:var(--mono);text-align:right}
.thumb{width:46px;height:46px;border-radius:7px;object-fit:cover;background:var(--bg);border:1px solid var(--line2);display:block}
.thumb.broken{display:none}
.thumb-broken{width:46px;height:46px;border-radius:7px;border:1px dashed var(--err);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--err-l);text-align:center;font-family:var(--mono);padding:3px}
.alts{display:flex;flex-direction:column;gap:3px}
.alt{font-size:12px;padding:2px 8px;border-radius:6px;border:1px solid var(--line);background:var(--bg2);color:var(--ink2)}
.alt.correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok-l);font-weight:700}
.alt.missing{border-style:dashed;color:var(--ink3);font-style:italic}
.alt .lt{font-family:var(--mono);font-weight:800;opacity:.7;margin-right:6px;font-size:11px}
.tag{font-size:10px;font-family:var(--mono);font-weight:700;padding:1px 6px;border-radius:5px;border:1px solid var(--line2);color:var(--ink3)}
.tag.on{border-color:var(--ok);color:var(--ok-l)}
.tag.off{border-color:var(--line);color:var(--ink3);opacity:.6}

.verify{font-size:13px}
.verify .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line2);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:7px}
@keyframes spin{to{transform:rotate(360deg)}}

.expl{font-size:12px;color:var(--ink2);max-width:340px;line-height:1.45}
.empty-cell{color:var(--ink3);font-style:italic;font-size:12px}

/* hiscore */
.tokwarn{font-size:12px;color:var(--ink3);background:var(--bg2);border:1px dashed var(--line2);border-radius:8px;padding:11px 13px}
.del{background:var(--err-bg);border:1px solid #3a2023;color:var(--err-l);padding:4px 9px;border-radius:6px;font-size:11px;font-weight:700}
.del:hover{background:var(--err);color:#fff}
.today{font-size:9px;font-weight:800;background:var(--brass);color:#1a1206;padding:1px 5px;border-radius:4px;font-family:var(--mono)}

.loader{text-align:center;padding:60px;color:var(--ink3)}
.loader .spin{width:26px;height:26px;border:3px solid var(--line2);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
.errbox{background:var(--err-bg);border:1px solid #3a2023;color:#ffd7d3;border-radius:var(--r);padding:18px 20px;font-size:14px}
.errbox h3{font-family:var(--disp);margin:0 0 8px;color:var(--err-l)}
.errbox code{font-family:var(--mono);font-size:12px;background:#1a0f10;padding:1px 6px;border-radius:5px;color:#ffb3ae}
footer{text-align:center;color:var(--ink3);font-size:11px;font-family:var(--mono);padding:20px}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <div>
      <h1>Trum<span>Quiz</span> · Adminkonsol</h1>
      <div class="sub" id="srcline">läser arket via Worker-proxyn</div>
    </div>
  </div>
  <div class="spacer"></div>
  <span class="status" id="status">—</span>
  <button class="tbtn" id="cfgbtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Inställningar
  </button>
  <button class="tbtn primary" id="reload">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    Ladda om
  </button>
  <div id="cfg">
    <div><label>Worker-URL</label><input id="c_worker" value="https://quiz.trumslagaren.workers.dev"><div class="hint">backend som proxar arket & serverar /data</div></div>
    <div><label>Google Sheet-ID</label><input id="c_sheet" value="1Ygh15DbQmABuX9999XOOzPbKg0bRrKkcHs0OUb8DUbA"><div class="hint">flikar: Quiz · Fragor · Nivaer</div></div>
    <div><label>Frontend-bas (för bildlänkar)</label><input id="c_qbase" value="https://trumquiz.trumslagaren.se"><div class="hint">används för thumbnails av lokala bilder</div></div>
    <div><label>Admin-token (valfri)</label><input id="c_token" type="password" placeholder="krävs bara för topplistehantering"><div class="hint">lagras enbart i minnet under sessionen</div></div>
  </div>
</header>

<div class="summary" id="summary"></div>

<div class="wrap">
  <aside>
    <div class="side-tools">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="qsearch" placeholder="Sök quiz…">
      </div>
      <label class="filt" id="probfilt"><input type="checkbox" id="probchk" style="accent-color:var(--err)"> Bara problem</label>
    </div>
    <div class="qlist" id="qlist"></div>
  </aside>
  <main id="detail">
    <div class="loader"><div class="spin"></div>Läser arket…</div>
  </main>
</div>

<footer id="foot"></footer>

<script>
"use strict";

/* ---------------- konfig ---------------- */
const $ = s => document.querySelector(s);
let CFG = { worker:"", sheet:"", qbase:"", token:"" };
function readCfg(){
  CFG.worker = $("#c_worker").value.trim().replace(/\/+$/,"");
  CFG.sheet  = $("#c_sheet").value.trim();
  CFG.qbase  = $("#c_qbase").value.trim().replace(/\/+$/,"");
  CFG.token  = $("#c_token").value;
}

/* ---------------- hjälpfunktioner ---------------- */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function gvizUrl(sheet, reqId){
  return `https://docs.google.com/spreadsheets/d/${CFG.sheet}/gviz/tq?tqx=out:csv;reqId:${reqId}&headers=1&sheet=${encodeURIComponent(sheet)}`;
}
function proxy(url){ return `${CFG.worker}/img?url=${encodeURIComponent(url)}`; }

// matchar Workerns robusta idEq (tål versaler/blanksteg/osynliga tecken)
function idEq(a,b){
  const n = s => String(s==null?"":s).replace(/[\u200B-\u200D\uFEFF\u00A0]/g,"").replace(/\s+/g,"").toLowerCase();
  return n(a)===n(b);
}
function asNum(v){
  if(v==null) return {ok:false,empty:true,raw:""};
  const s=String(v).trim();
  if(s==="") return {ok:false,empty:true,raw:""};
  const n=Number(s.replace(/\s/g,""));
  if(!isFinite(n)) return {ok:false,bad:true,raw:s};
  return {ok:true,n,raw:s};
}
function bildSrc(b){
  b=String(b||"").trim();
  if(!b) return "";
  if(/^https?:\/\//i.test(b)) return `${CFG.worker}/img?url=${encodeURIComponent(b)}`;
  return `${CFG.qbase}/images/${b}`;
}

/* ---------------- CSV ---------------- */
function parseCSV(text){
  const rows=[]; let row=[],cur="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; }
      else cur+=c;
    } else {
      if(c==='"') inQ=true;
      else if(c===","){ row.push(cur); cur=""; }
      else if(c==="\r"){ /* skip */ }
      else if(c==="\n"){ row.push(cur); rows.push(row); row=[]; cur=""; }
      else cur+=c;
    }
  }
  if(cur!=="" || row.length){ row.push(cur); rows.push(row); }
  return rows;
}
function toObjects(rows){
  if(!rows.length) return {headers:[],items:[]};
  const headers = rows[0].map(h=>String(h).trim());
  const items=[];
  for(let r=1;r<rows.length;r++){
    const cells=rows[r];
    if(!cells || cells.every(c=>String(c).trim()==="")) continue;
    const o={__row:r+1};
    headers.forEach((h,i)=>{ o[h]= cells[i]!=null?cells[i]:""; });
    items.push(o);
  }
  return {headers,items};
}
function field(o,name){
  if(!o) return "";
  const t=name.toLowerCase();
  for(const k in o){ if(k==="__row")continue; if(k.trim().toLowerCase()===t) return String(o[k]==null?"":o[k]).trim(); }
  return "";
}

/* ---------------- datahämtning ---------------- */
async function fetchSheet(sheet, reqId){
  const res = await fetch(proxy(gvizUrl(sheet,reqId)), {cache:"no-store"});
  if(!res.ok) throw new Error(`HTTP ${res.status} vid hämtning av fliken "${sheet}"`);
  const text = await res.text();
  const t=text.trim();
  if(t.startsWith("<")) throw new Error(`Fliken "${sheet}" gav HTML i stället för CSV — arket är troligen inte delat som "Alla med länken kan visa", eller fliknamnet är fel.`);
  return toObjects(parseCSV(text));
}

/* ---------------- validering / modellbygge ---------------- */
function analyze(quiz, fragor, nivaer){
  const quizzes = [];
  const seen = {};
  const usedQids = [];

  quiz.items.forEach(row => quiz.items.length && usedQids.push(field(row,"quiz_id")));

  quiz.items.forEach(row=>{
    const qid = field(row,"quiz_id");
    const issues = [];
    const add=(lvl,msg,src)=>issues.push({lvl,msg,src:src||""});

    // --- inställningar ---
    if(!qid) add("err","Tomt <b>quiz_id</b> — raden går inte att nå","Quiz r."+row.__row);
    else{
      if(seen[qid.toLowerCase()]) add("err",`Duplicerat <b>quiz_id</b> "${esc(qid)}" — finns på flera rader`,"Quiz");
      seen[qid.toLowerCase()]=true;
      if(!/^[a-z0-9-]+$/.test(qid)) add("warn",`<b>quiz_id</b> "${esc(qid)}" innehåller tecken utöver a–z, siffror och bindestreck`,"Quiz");
    }
    const titel_sv = field(row,"titel_sv");
    const titel_en = field(row,"titel_en");
    if(!titel_sv) add("err","<b>titel_sv</b> saknas","Quiz");
    if(!titel_en) add("info","<b>titel_en</b> saknas — engelskt läge faller tillbaka på svenska","Quiz");

    const sek = asNum(field(row,"sekunder_per_fraga"));
    if(!sek.ok) add("warn",`<b>sekunder_per_fraga</b> är inte ett giltigt tal ("${esc(sek.raw)}")`,"Quiz");
    else if(sek.n<5 || sek.n>120) add("info",`<b>sekunder_per_fraga</b> = ${sek.n} ligger utanför det typiska intervallet 15–30`,"Quiz");

    const bf=field(row,"blanda_fragor").toLowerCase(), ba=field(row,"blanda_alternativ").toLowerCase();
    if(bf && !["ja","nej"].includes(bf)) add("warn",`<b>blanda_fragor</b> bör vara "ja" eller "nej" (är "${esc(bf)}")`,"Quiz");
    if(ba && !["ja","nej"].includes(ba)) add("warn",`<b>blanda_alternativ</b> bör vara "ja" eller "nej" (är "${esc(ba)}")`,"Quiz");

    const maxRaw=field(row,"max_fragor");
    let maxF=null;
    if(maxRaw!==""){
      const m=asNum(maxRaw);
      if(!m.ok || m.n<1 || m.n%1!==0) add("warn",`<b>max_fragor</b> är inte ett giltigt heltal ("${esc(maxRaw)}")`,"Quiz");
      else maxF=m.n;
    }

    // --- frågor ---
    const questions = fragor.items.filter(q=>idEq(field(q,"quiz_id"),qid)).map(q=>{
      const qi=[];
      const fr=field(q,"fraga_sv");
      const opts={a:field(q,"alt_a_sv"),b:field(q,"alt_b_sv"),c:field(q,"alt_c_sv"),d:field(q,"alt_d_sv")};
      const ratt=field(q,"ratt").toLowerCase();
      if(!fr) qi.push({lvl:"err",msg:"fråga saknar <b>fraga_sv</b>"});
      const filled=Object.keys(opts).filter(k=>opts[k]!=="");
      if(filled.length<2) qi.push({lvl:"err",msg:`endast ${filled.length} svarsalternativ ifyllda`});
      // glapp i alternativ (a,b,d men inte c)
      const order=["a","b","c","d"];
      const lastFilled=Math.max(...order.map((k,i)=>opts[k]!==""?i:-1));
      for(let i=0;i<=lastFilled;i++){ if(opts[order[i]]==="") { qi.push({lvl:"warn",msg:`alternativ ${order[i].toUpperCase()} är tomt men ${order[lastFilled].toUpperCase()} är ifyllt (lucka mellan alternativen)`}); break; } }
      if(!["a","b","c","d"].includes(ratt)) qi.push({lvl:"err",msg:`<b>ratt</b> = "${esc(field(q,"ratt"))}" är inte a/b/c/d`});
      else if(opts[ratt]==="") qi.push({lvl:"err",msg:`<b>ratt</b> pekar på alternativ ${ratt.toUpperCase()} som är tomt`});
      // engelska
      const enFr=field(q,"fraga_en");
      const enAny=["alt_a_en","alt_b_en","alt_c_en","alt_d_en"].some(k=>field(q,k)!=="");
      if((enFr!=="")!==enAny && (enFr!=="" || enAny)) qi.push({lvl:"info",msg:"ofullständig engelsk översättning (fråga och alternativ matchar inte)"});
      const bild=field(q,"bild");
      return {row:q.__row, fr, opts, ratt, bild, fr_en:enFr, forklaring_sv:field(q,"forklaring_sv"), forklaring_en:field(q,"forklaring_en"), issues:qi};
    });
    if(qid && questions.length===0) add("err","Inga frågor kopplade till detta quiz (E02)","Fragor");
    const qErr=questions.reduce((a,q)=>a+q.issues.filter(i=>i.lvl==="err").length,0);
    const qWarn=questions.reduce((a,q)=>a+q.issues.filter(i=>i.lvl==="warn").length,0);
    if(qErr) add("err",`${qErr} fråge-fel — se Frågor nedan`,"Fragor");
    if(qWarn) add("warn",`${qWarn} fråge-varningar — se Frågor nedan`,"Fragor");
    if(maxF && maxF>questions.length) add("info",`<b>max_fragor</b> = ${maxF} men endast ${questions.length} frågor finns — alla används`,"Quiz");

    // --- nivåer ---
    const ownLevels = nivaer.items.filter(l=>idEq(field(l,"quiz_id"),qid));
    const defLevels = nivaer.items.filter(l=>idEq(field(l,"quiz_id"),"default"));
    let levelSource = ownLevels.length ? "egna" : (defLevels.length ? "default" : "fallback");
    const effLevels = (ownLevels.length?ownLevels:defLevels).map(l=>{
      const minN=asNum(field(l,"min")), maxN=asNum(field(l,"max"));
      const li=[];
      if(minN.empty) li.push("min är tom");
      else if(!minN.ok) li.push(`min ("${esc(minN.raw)}") är inte ett tal`);
      if(maxN.empty) li.push("max är tom");
      else if(!maxN.ok) li.push(`max ("${esc(maxN.raw)}") är inte ett tal`);
      if(minN.ok&&maxN.ok&&minN.n>maxN.n) li.push("min är större än max");
      if(!field(l,"titel_sv")) li.push("titel_sv saknas");
      const lvlErrBild = !field(l,"bild");
      return {row:l.__row,minN,maxN,titel_sv:field(l,"titel_sv"),titel_en:field(l,"titel_en"),text_sv:field(l,"text_sv"),bild:field(l,"bild"),issues:li,noBild:lvlErrBild};
    });
    if(levelSource==="fallback") add("warn","Inga egna nivåer och ingen <b>default</b>-rad — Workern använder hårdkodade DEFAULT_LEVELS","Nivaer");
    else if(levelSource==="default") add("info","Inga egna nivåer — använder <b>default</b>-raderna","Nivaer");
    effLevels.forEach(l=>{ l.issues.forEach(m=>add("err",`Nivå (rad ${l.row}): ${m}`,"Nivaer")); if(l.noBild) add("warn",`Nivå "${esc(l.titel_sv||"?")}" saknar <b>bild</b> — delningskortet (og:image) blir utan bild`,"Nivaer"); });
    const cov = coverage(effLevels);
    cov.issues.forEach(i=>add(i.lvl,i.msg,"Nivaer"));

    const errN=issues.filter(i=>i.lvl==="err").length;
    const warnN=issues.filter(i=>i.lvl==="warn").length;
    const sev = errN?"err":(warnN?"warn":"ok");

    quizzes.push({
      qid, titel_sv, titel_en, row:row.__row, raw:row,
      config:{ sekunder_per_fraga:field(row,"sekunder_per_fraga"), blanda_fragor:field(row,"blanda_fragor"),
               blanda_alternativ:field(row,"blanda_alternativ"), sida_slug:field(row,"sida_slug"), max_fragor:maxRaw, maxF },
      questions, ownLevels, effLevels, levelSource, coverage:cov,
      issues, errN, warnN, sev
    });
  });

  // föräldralös data
  const orphanQ = fragor.items.filter(q=>{ const id=field(q,"quiz_id"); return id && !quiz.items.some(r=>idEq(field(r,"quiz_id"),id)); });
  const orphanL = nivaer.items.filter(l=>{ const id=field(l,"quiz_id"); return id && !idEq(id,"default") && !quiz.items.some(r=>idEq(field(r,"quiz_id"),id)); });
  const orphanGroups = {};
  orphanQ.forEach(q=>{ const id=field(q,"quiz_id"); (orphanGroups[id]=orphanGroups[id]||{q:0,l:0}).q++; });
  orphanL.forEach(l=>{ const id=field(l,"quiz_id"); (orphanGroups[id]=orphanGroups[id]||{q:0,l:0}).l++; });

  const totals = {
    quizzes: quizzes.length,
    questions: quizzes.reduce((a,q)=>a+q.questions.length,0),
    levels: quizzes.reduce((a,q)=>a+q.ownLevels.length,0),
    errQ: quizzes.filter(q=>q.sev==="err").length,
    warnQ: quizzes.filter(q=>q.sev==="warn").length,
  };
  return {quizzes, totals, orphanGroups, headers:{quiz:quiz.headers,fragor:fragor.headers,nivaer:nivaer.headers}};
}

function coverage(levels){
  const valid = levels.filter(l=>l.minN.ok&&l.maxN.ok&&l.minN.n<=l.maxN.n)
    .map(l=>({min:l.minN.n,max:l.maxN.n,titel:l.titel_sv||"?"})).sort((a,b)=>a.min-b.min);
  const issues=[];
  if(valid.length){
    if(valid[0].min>0) issues.push({lvl:"warn",msg:`Nivåerna täcker inte 0 % — <b>0–${valid[0].min-1}%</b> saknar nivå`});
    const top=valid[valid.length-1];
    if(top.max<100) issues.push({lvl:"warn",msg:`Nivåerna täcker inte 100 % — <b>${top.max+1}–100%</b> saknar nivå`});
    for(let i=1;i<valid.length;i++){
      const p=valid[i-1],c=valid[i];
      if(c.min<=p.max) issues.push({lvl:"warn",msg:`Nivåerna "${esc(p.titel)}" (${p.min}–${p.max}) och "${esc(c.titel)}" (${c.min}–${c.max}) <b>överlappar</b>`});
      else if(c.min>p.max+1) issues.push({lvl:"warn",msg:`<b>Glapp ${p.max+1}–${c.min-1}%</b> mellan "${esc(p.titel)}" och "${esc(c.titel)}"`});
    }
  }
  return {valid,issues};
}

let SELECTED=null;
function renderList(){
  const q=$("#qsearch").value.trim().toLowerCase();
  const onlyProb=$("#probchk").checked;
  let list=MODEL.quizzes.slice();
  if(q) list=list.filter(x=>(x.qid+" "+x.titel_sv+" "+x.titel_en).toLowerCase().includes(q));
  if(onlyProb) list=list.filter(x=>x.sev!=="ok");
  list.sort((a,b)=>({err:0,warn:1,ok:2}[a.sev]-{err:0,warn:1,ok:2}[b.sev]) || a.qid.localeCompare(b.qid,"sv"));

  const orphanN=Object.keys(MODEL.orphanGroups).length;
  let html = list.map((x,i)=>{
    const badge = x.errN?`<span class="badge err">${x.errN}✕</span>`:(x.warnN?`<span class="badge warn">${x.warnN}!</span>`:"");
    return `<button class="qcard ${SELECTED===x.qid?"sel":""}" style="animation-delay:${i*22}ms" data-q="${esc(x.qid)}">
      <span class="led ${x.sev}"></span>
      <span class="qi"><span class="qt">${esc(x.titel_sv||"(utan titel)")}</span><span class="qid">${esc(x.qid||"⟨tomt id⟩")}</span></span>
      <span class="qmeta">${x.questions.length} fr.<br>${badge||(x.sev==="ok"?'<span style="color:var(--ok-l)">ok</span>':"")}</span>
    </button>`;
  }).join("");
  if(!list.length) html=`<div style="color:var(--ink3);font-size:13px;padding:20px;text-align:center">Inga quiz matchar.</div>`;
  if(orphanN && !onlyProb && !q){
    html += `<button class="qcard" data-q="__orphans" style="border-style:dashed">
      <span class="led warn"></span>
      <span class="qi"><span class="qt">Föräldralös data</span><span class="qid">frågor/nivåer utan quiz</span></span>
      <span class="qmeta">${orphanN} id</span></button>`;
  }
  $("#qlist").innerHTML=html;
  $("#qlist").querySelectorAll(".qcard").forEach(b=>b.addEventListener("click",()=>select(b.dataset.q)));
}

function select(qid){
  SELECTED=qid;
  $("#qlist").querySelectorAll(".qcard").forEach(b=>b.classList.toggle("sel",b.dataset.q===qid));
  if(qid==="__orphans") return renderOrphans();
  const x=MODEL.quizzes.find(q=>q.qid===qid);
  if(x) renderDetail(x);
}

  </div>`;

  wireThumbs($("#detail"));
  $("#loadScores")&&$("#loadScores").addEventListener("click",()=>loadScores(x.qid));
  runVerify(x);
}

function renderLevels(x){
  if(!x.effLevels.length){
    return `<div class="tokwarn">Inga nivårader i arket för detta quiz och ingen <b>default</b>-rad — Workern använder sina hårdkodade <code style="font-family:var(--mono)">DEFAULT_LEVELS</code>. Lägg in egna rader i <b>Nivaer</b> för att styra resultatsidan och delningskortet.</div>`;
  }
  // coverage-bar
  const segColors=["#e0a458","#56d364","#58a6ff","#d29922","#bc8cff","#f0883e","#39c5cf"];
  let bar="";
  x.coverage.valid.forEach((l,i)=>{
    const left=Math.max(0,Math.min(100,l.min));
    const w=Math.max(0.5,Math.min(100,l.max+1)-l.min);
    bar+=`<div class="seg" title="${esc(l.titel)} (${l.min}–${l.max}%)" style="left:${left}%;width:${w}%;background:${segColors[i%segColors.length]}">${w>10?esc(l.titel):""}</div>`;
  });
  [0,25,50,75,100].forEach(t=>{ bar+=`<div class="tick" style="left:${t}%"></div><span class="tlbl" style="left:${t}%">${t}</span>`; });

  const rows=x.effLevels.map(l=>{
    const bad=l.issues.length>0;
    const src=bildSrc(l.bild);
    return `<tr class="${bad?"bad":(l.noBild?"warnrow":"")}">
      <td class="num">${l.minN.ok?l.minN.n:'<span class="flag err">'+(l.minN.empty?"tom":esc(l.minN.raw))+'</span>'}</td>
      <td class="num">${l.maxN.ok?l.maxN.n:'<span class="flag err">'+(l.maxN.empty?"tom":esc(l.maxN.raw))+'</span>'}</td>
      <td><b>${esc(l.titel_sv)||'<span class="flag err">saknas</span>'}</b>${l.titel_en?`<br><span class="empty-cell" style="font-style:normal">${esc(l.titel_en)}</span>`:""}</td>
      <td class="expl">${esc(l.text_sv)||'<span class="empty-cell">—</span>'}</td>
      <td>${src?`<img class="thumb" data-src="${esc(src)}" alt="">`:'<span class="flag warn">ingen og:image</span>'}</td>
    </tr>`;
  }).join("");

  return `<div class="cov">${bar}</div>
    <div class="covnote">Täckningskarta 0–100 % · luckor = vit yta, överlapp = staplade segment</div>
    <table class="tbl"><thead><tr><th>min</th><th>max</th><th>Titel</th><th>Text (sv)</th><th>Bild</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderQuestions(x){
  if(!x.questions.length) return `<div class="errbox" style="margin:0"><h3>E02 · Inga frågor</h3><p>Lägg till rader i <b>Fragor</b>-fliken med <code>quiz_id = ${esc(x.qid)}</code>.</p></div>`;
  const rows=x.questions.map((q,i)=>{
    const hasErr=q.issues.some(z=>z.lvl==="err");
    const hasWarn=q.issues.some(z=>z.lvl==="warn");
    const alts=["a","b","c","d"].map(k=>{
      const v=q.opts[k];
      const correct=q.ratt===k && v!=="";
      const miss=v==="";
      return `<div class="alt ${correct?"correct":""} ${miss?"missing":""}"><span class="lt">${k.toUpperCase()}</span>${miss?"(tom)":esc(v)}</div>`;
    }).join("");
    const src=bildSrc(q.bild);
    const issueLine = q.issues.length?`<div style="margin-top:6px">${q.issues.map(z=>`<span class="flag ${z.lvl==="err"?"err":z.lvl==="warn"?"warn":"ok"}" style="margin-right:5px">${z.msg.replace(/<[^>]+>/g,"")}</span>`).join("")}</div>`:"";
    return `<tr class="${hasErr?"bad":(hasWarn?"warnrow":"")}">
      <td class="num" style="color:var(--ink3)">${i+1}<div style="font-size:9px;opacity:.6">r${q.row}</div></td>
      <td>${q.fr?esc(q.fr):'<span class="flag err">fraga_sv saknas</span>'}${q.fr_en?`<div class="empty-cell" style="font-style:normal;margin-top:3px">🌐 ${esc(q.fr_en)}</div>`:""}${issueLine}</td>
      <td><div class="alts">${alts}</div></td>
      <td style="text-align:center"><span class="alt ${["a","b","c","d"].includes(q.ratt)&&q.opts[q.ratt]?"correct":""}" style="display:inline-block">${esc(q.ratt||"—").toUpperCase()}</span></td>
      <td>${src?`<img class="thumb" data-src="${esc(src)}" alt="">`:'<span class="empty-cell">—</span>'}</td>
      <td style="text-align:center">
        <span class="tag ${q.forklaring_sv?"on":"off"}">förkl sv</span>
        <span class="tag ${q.forklaring_en?"on":"off"}" style="margin-top:3px;display:inline-block">förkl en</span>
      </td>
    </tr>`;
  }).join("");
  return `<table class="tbl"><thead><tr><th>#</th><th>Fråga</th><th>Alternativ</th><th>Rätt</th><th>Bild</th><th>Förkl.</th></tr></thead><tbody>${rows}</tbody></table>`;
}

/* bild-thumbnails: ladda lazy och flagga trasiga */
function wireThumbs(root){
  root.querySelectorAll("img.thumb").forEach(img=>{
    const src=img.dataset.src;
    img.src=src;
    img.onerror=()=>{
      const d=document.createElement("div");
      d.className="thumb-broken";
      d.textContent="bild ⚠";
      d.title="Bilden kunde inte laddas: "+src;
      img.replaceWith(d);
      const tr=d.closest("tr"); if(tr && !tr.classList.contains("bad")) tr.classList.add("warnrow");
    };
  });
}

/* ---------------- Worker-verifiering (/data) ---------------- */
const verifyCache={};
async function runVerify(x){
  // injicera verifieringskort i nivå-sektionen
  const lvlSec = $("#detail").querySelectorAll(".sec")[2];
  if(!lvlSec) return;
  const card=document.createElement("div");
  card.style.cssText="margin-top:12px;padding:11px 13px;border:1px solid var(--line2);border-radius:9px;background:var(--bg2);font-size:13px";
  card.innerHTML=`<span class="spin"></span> Verifierar mot Workern (<code style="font-family:var(--mono)">/data?quiz=${esc(x.qid)}</code>)…`;
  lvlSec.querySelector(".sbody").appendChild(card);

  try{
    let data=verifyCache[x.qid];
    if(!data){
      const r=await fetch(`${CFG.worker}/data?quiz=${encodeURIComponent(x.qid)}`,{cache:"no-store"});
      if(r.status===404){ verifyCache[x.qid]={notfound:true}; data=verifyCache[x.qid]; }
      else { data=await r.json(); verifyCache[x.qid]=data; }
    }
    if(data.notfound){
      card.style.borderColor="#3a2023"; card.style.background="var(--err-bg)";
      card.innerHTML=`<b style="color:var(--err-l)">✕ Workern hittar inte quizet (404 / E01)</b><br>
        <span style="color:#ffd7d3">Quizet finns i arket men <code style="font-family:var(--mono)">/data?quiz=${esc(x.qid)}</code> ger 404. Trolig orsak: versal-/blankstegsmiss i <code style="font-family:var(--mono)">quiz_id</code>, eller hopslagen rubrik/datarad i gviz (kontrollera kolumntyperna).</span>`;
      return;
    }
    const dLevels=(data.levels||[]).map(l=>String(l.titel_sv||l.titel||"").trim()).filter(Boolean);
    const dQ=(data.questions||[]).length;
    const expQ = x.config.maxF ? Math.min(x.questions.length,x.config.maxF) : x.questions.length;

    const lines=[];
    // nivåjämförelse
    if(x.ownLevels.length){
      const ownTitles=x.effLevels.map(l=>l.titel_sv).filter(Boolean).sort();
      const dSorted=dLevels.slice().sort();
      const match = ownTitles.length===dSorted.length && ownTitles.every((t,i)=>t===dSorted[i]);
      if(match) lines.push(`<span style="color:var(--ok-l)">✓</span> Nivåer: Workern returnerar samma ${dLevels.length} egna nivåer som arket`);
      else lines.push(`<span style="color:var(--err-l)">✕</span> <b>Nivåfel:</b> arket har ${x.ownLevels.length} egna nivåer men Workern returnerar ${dLevels.length} (${esc(dLevels.join(", ")||"–")}). <b>Trolig gviz-/idEq-miss → faller tillbaka på default/hårdkodat.</b>`);
    } else {
      lines.push(`<span style="color:var(--info)">i</span> Nivåer: inga egna i arket — Workern levererar ${dLevels.length} ${x.levelSource==="default"?"default-":"fallback-"}nivåer (${esc(dLevels.join(", ")||"–")})`);
    }
    // frågeantal
    if(dQ===expQ) lines.push(`<span style="color:var(--ok-l)">✓</span> Frågor: Workern returnerar ${dQ} frågor (förväntat ${expQ})`);
    else lines.push(`<span style="color:var(--warn-l)">!</span> Frågor: Workern returnerar ${dQ}, förväntat ${expQ} ${x.config.maxF?`(max_fragor=${x.config.maxF}, ${x.questions.length} i arket)`:`(${x.questions.length} i arket)`}`);

    card.style.borderColor="var(--line2)";
    card.innerHTML=`<div style="font-weight:700;margin-bottom:6px;font-family:var(--disp)">Worker-verifiering · <code style="font-family:var(--mono);font-size:11px;font-weight:400">/data</code></div>${lines.map(l=>`<div style="margin:3px 0">${l}</div>`).join("")}`;
  }catch(e){
    card.style.borderColor="#3a3017"; card.style.background="var(--warn-bg)";
    card.innerHTML=`<span style="color:var(--warn-l)">! Kunde inte verifiera mot Workern:</span> ${esc(e.message)}`;
  }
}

/* ---------------- Topplista (token) ---------------- */
async function loadScores(qid){
  if(!CFG.token){ $("#scoreBody").innerHTML='<div class="tokwarn">Fyll i <b>Admin-token</b> under Inställningar först.</div>'; return; }
  const body=$("#scoreBody");
  body.innerHTML='<div class="loader" style="padding:24px"><div class="spin"></div>Hämtar resultat…</div>';
  try{
    const r=await fetch(`${CFG.worker}/admin/scores?quiz=${encodeURIComponent(qid)}&token=${encodeURIComponent(CFG.token)}`,{cache:"no-store"});
    if(r.status===401||r.status===403){ body.innerHTML='<div class="errbox" style="margin:0"><h3>Nekad åtkomst</h3><p>Admin-token godtogs inte av Workern.</p></div>'; return; }
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data=await r.json();
    const list=Array.isArray(data)?data:(data.scores||data.list||[]);
    if(!list.length){ body.innerHTML='<div class="tokwarn">Inga sparade resultat för detta quiz.</div>'; return; }
    list.sort((a,b)=>(b.score||0)-(a.score||0));
    const rows=list.map((s,i)=>`<tr>
      <td class="num" style="color:var(--ink3)">${i+1}</td>
      <td><b>${esc(s.name||"")}</b> ${s.today?'<span class="today">idag</span>':""}</td>
      <td class="num">${esc(s.score!=null?s.score:"")}</td>
      <td class="num">${s.pct!=null?esc(s.pct)+"%":""}</td>
      <td class="mono" style="font-size:11px;color:var(--ink3)">${esc(s.date||"")} · ${esc(s.lang||"")}</td>
      <td class="mono" style="font-size:10px;color:var(--ink3)">${esc(s.id||"")}</td>
      <td style="text-align:right"><button class="del" data-id="${esc(s.id||"")}">Radera</button></td>
    </tr>`).join("");
    body.innerHTML=`<table class="tbl"><thead><tr><th>#</th><th>Namn</th><th class="num">Poäng</th><th class="num">%</th><th>Datum · språk</th><th>id</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      <p style="font-size:11px;color:var(--ink3);margin:10px 0 0">${list.length} resultat totalt · sorterat på poäng</p>`;
    body.querySelectorAll(".del").forEach(b=>b.addEventListener("click",()=>delScore(qid,b.dataset.id,b)));
  }catch(e){
    body.innerHTML=`<div class="errbox" style="margin:0"><h3>Fel</h3><p>${esc(e.message)}</p></div>`;
  }
}
async function delScore(qid,id,btn){
  if(!id) return;
  if(!confirm(`Radera resultat ${id} permanent? Detta går inte att ångra.`)) return;
  btn.disabled=true; btn.textContent="…";
  try{
    const r=await fetch(`${CFG.worker}/admin/delete`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id,quiz_id:qid,token:CFG.token})});
    if(!r.ok) throw new Error("HTTP "+r.status);
    btn.closest("tr").style.opacity=".35"; btn.textContent="raderad"; btn.style.background="var(--ok-bg)"; btn.style.color="var(--ok-l)";
  }catch(e){ btn.disabled=false; btn.textContent="Radera"; alert("Kunde inte radera: "+e.message); }
}

/* ---------------- events ---------------- */
function togFilt(){ $("#probfilt").classList.toggle("active",$("#probchk").checked); renderList(); }
$("#cfgbtn").addEventListener("click",()=>$("#cfg").classList.toggle("open"));
$("#reload").addEventListener("click",()=>{ verifyCache && Object.keys(verifyCache).forEach(k=>delete verifyCache[k]); loadAll(); });
$("#qsearch").addEventListener("input",renderList);
$("#probchk").addEventListener("change",togFilt);
[ "c_worker","c_sheet","c_qbase" ].forEach(id=>$("#"+id).addEventListener("change",()=>loadAll()));
$("#c_token").addEventListener("change",()=>{ readCfg(); if(SELECTED && SELECTED!=="__orphans"){ const x=MODEL&&MODEL.quizzes.find(q=>q.qid===SELECTED); if(x) renderDetail(x);} });

loadAll();
</script>
