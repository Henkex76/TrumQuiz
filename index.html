<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trumquiz</title>

<!-- ===================================================================
     OPEN GRAPH — detta är bilden/texten Facebook visar i flödet.
     Byt ut URL:erna mot dina riktiga när quizet ligger live.
     OBS: Facebook läser dessa STATISKT (kör ej JavaScript), så
     delningsbilden är alltid samma branded bild oavsett poäng.
     Den personliga poängen följer med i delningstexten på mobil.
==================================================================== -->
<meta property="og:type" content="website">
<meta property="og:title" content="Trumquiz – hur bra koll har du på trummor?">
<meta property="og:description" content="Testa dig själv i Trumslagarens trumquiz!">
<meta property="og:image" content="https://trumquiz.trumslagaren.se/images/og-default.jpg">
<meta property="og:url" content="https://trumquiz.trumslagaren.se/">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#016ba0;
  --blue-dark:#004264;
  --green:#50af4a;
  --orange:#f07305;
  --red:#e0492f;
  --ink:#19222e;
  --muted:#6b7785;
  --line:#b7b7b7;
  --bg:#f8f8f9;
  --card:#ffffff;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:'Open Sans',system-ui,sans-serif;
  color:var(--ink);
  background:var(--bg);
  line-height:1.55;
  display:flex;
  justify-content:center;
  padding:16px;
  overflow-y:auto;
}
#app{
  width:100%;
  max-width:560px;
  align-self:flex-start;
}
.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:0 4px 24px rgba(20,40,70,.08);
  overflow:hidden;
}

/* ---- kompakt layout vid begränsad skärmhöjd ---- */
@media(max-height:680px){
  body{padding:8px}
  .start{padding:22px 20px}
  .start h1{font-size:clamp(26px,8vw,38px)}
  .start .sub,.meta .lbl{font-size:11px}
  .meta .num{font-size:24px}
  .meta{margin-bottom:20px}
  .qhead{padding:10px 16px 0}
  .progress-row{margin-bottom:8px}
  .qbody{padding:12px 16px}
  .option{min-height:46px;padding:10px 14px;font-size:14px}
  .result-inner{padding:22px 20px}
  .ring{width:120px;height:120px}
}

.hs-level{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;
  font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-left:6px;vertical-align:middle}
.hs-level-master{background:#fff3cd;color:#a16500}
.hs-level-silver{background:#f0f0f0;color:#5f6368}
.hs-level-pagang{background:#e8f0fe;color:#1a5aab}

/* ---- hi-score modal ---- */
.hs-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;
  align-items:center;justify-content:center;z-index:1000;padding:20px}
.hs-modal{background:var(--card);border-radius:var(--radius);padding:30px 24px;
  max-width:360px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.hs-modal-icon{font-size:44px;margin-bottom:8px}
.hs-modal-title{font-family:'Anton',sans-serif;font-size:22px;color:var(--blue-dark);
  line-height:1.2;margin-bottom:6px;text-transform:uppercase}
.hs-modal-pts{font-family:'Anton',sans-serif;font-size:28px;color:var(--orange);margin-bottom:16px}
.hs-modal-skip{display:block;width:100%;margin-top:10px;padding:8px;border:none;
  background:none;color:var(--muted);font-size:13px;cursor:pointer;text-decoration:underline}
.hs-modal-err{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}

/* ---- hi-score ---- */
.score-pts{text-align:center;margin:6px 0 14px;color:var(--muted);font-size:13px}
.score-pts-num{font-family:'Anton',sans-serif;font-size:22px;color:var(--orange)}
.btn-scores{display:block;width:100%;margin-top:10px;padding:12px;border:1.5px solid var(--line);
  background:transparent;border-radius:10px;font:600 14px 'Open Sans';color:var(--blue);cursor:pointer;transition:.15s}
.btn-scores:hover{background:var(--bg)}
.hs-entry{padding:18px 20px;border-top:1px solid var(--line);text-align:center}
.hs-msg{font-weight:700;font-size:15px;color:var(--blue-dark);margin-bottom:14px;line-height:1.4}
.hs-input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;
  font:600 15px 'Open Sans';margin-bottom:10px;outline:none;transition:.15s}
.hs-input:focus{border-color:var(--blue)}
.hs-list{padding:24px 20px}
.hs-title{font-family:'Anton',sans-serif;font-size:22px;color:var(--blue-dark);margin-bottom:16px}
.hs-loading{text-align:center;color:var(--muted);padding:20px}
.hs-table{width:100%;border-collapse:collapse;margin-bottom:18px;font-size:14px}
.hs-table thead th{text-align:left;padding:6px 8px;border-bottom:2px solid var(--line);
  font:700 12px 'Open Sans';text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.hs-table tbody tr{border-bottom:1px solid var(--line)}
.hs-rank{width:32px;font-family:'Anton',sans-serif;font-size:18px;color:var(--muted);padding:10px 8px}
.hs-name{padding:10px 8px;font-weight:600}
.hs-pts{padding:10px 8px;font-family:'Anton',sans-serif;font-size:18px;color:var(--orange);text-align:right}
.hs-today{background:#f0f9ff}
.hs-you{font-size:11px;font-weight:400;color:var(--blue);margin-left:4px}
.hs-empty{text-align:center;padding:20px;color:var(--muted)}
.btn-back{display:block;width:100%;padding:12px;border:1.5px solid var(--line);
  background:transparent;border-radius:10px;font:600 14px 'Open Sans';color:var(--muted);cursor:pointer;transition:.15s}
.btn-back:hover{background:var(--bg)}

.exp-toggle{display:flex;align-items:center;justify-content:center;gap:7px;
  font-size:12px;color:var(--muted);cursor:pointer;margin-top:14px;user-select:none;
  letter-spacing:.01em}
.exp-toggle input{cursor:pointer;accent-color:var(--blue);width:15px;height:15px}
/* ---- start screen ---- */
.start{padding:40px 28px;text-align:center}
.start-logo{max-width:180px;width:55%;height:auto;margin:0 auto 18px;display:block}
.start h1{
  font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(34px,9vw,52px);
  line-height:.95;text-transform:uppercase;letter-spacing:.01em;color:var(--blue-dark);
  margin-bottom:8px;
}
.start .sub{color:var(--muted);font-size:15px;margin-bottom:28px}
.meta{display:flex;justify-content:center;gap:28px;margin-bottom:32px}
.meta div{display:flex;flex-direction:column;gap:2px}
.meta .num{font-family:'Anton',sans-serif;font-size:30px;color:var(--orange);line-height:1}
.meta .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.btn-primary{
  width:100%;border:none;cursor:pointer;
  background:var(--blue);color:#fff;
  font:700 17px 'Open Sans';padding:18px;border-radius:12px;
  transition:.15s;letter-spacing:.01em;
}
.btn-primary:hover{background:var(--blue-dark)}
.btn-primary:active{transform:scale(.985)}

/* ---- question screen ---- */
.qhead{padding:18px 20px 0}
.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.bar{flex:1;height:8px;background:var(--line);border-radius:6px;overflow:hidden}
.bar > span{display:block;height:100%;background:var(--blue);border-radius:6px;transition:width .35s ease}
.counter{font:700 13px 'Open Sans';color:var(--muted);white-space:nowrap}

.timer-wrap{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:4px}
.timer-bar{height:100%;width:100%;background:var(--green);border-radius:6px}
.timer-num{font:700 12px 'Open Sans';color:var(--muted);text-align:right;height:18px}

.qbody{padding:6px 20px 22px}
.qimg{width:100%;border-radius:12px;margin-bottom:18px;display:block}
.tag{
  display:inline-block;background:#e7f1f6;color:var(--blue);
  font:700 11px 'Open Sans';letter-spacing:.07em;text-transform:uppercase;
  padding:5px 11px;border-radius:6px;margin-bottom:14px;
}
.question{font-size:21px;font-weight:700;line-height:1.3;margin-bottom:22px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:430px){.options{grid-template-columns:1fr}}
.opt{
  min-height:58px;display:flex;align-items:center;text-align:left;
  border:2px solid var(--line);background:var(--card);
  border-radius:12px;padding:14px 16px;font:600 15px 'Open Sans';color:var(--ink);
  cursor:pointer;transition:.12s;
}
.opt:hover:not(:disabled){border-color:var(--blue);background:#f5fafd}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--green);background:#eafae8;color:#2c7a26}
.opt.wrong{border-color:var(--red);background:#fdecea;color:#b3331f}
.opt.dim{opacity:.5}

.explain{
  margin-top:18px;padding:14px 16px;border-radius:10px;
  background:#fff7ee;border:1px solid #ffe3c2;color:#7a4a10;font-size:14px;line-height:1.5;
}
.next-row{margin-top:18px;text-align:right}
.btn-next{
  border:none;cursor:pointer;background:var(--blue);color:#fff;
  font:700 15px 'Open Sans';padding:13px 26px;border-radius:10px;transition:.15s;
}
.btn-next:hover{background:var(--blue-dark)}

.result-level-lbl{font-size:11px;color:var(--muted);text-align:center;
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
/* ---- result screen ---- */
.result{padding:0;text-align:center}
.result-header{display:flex;align-items:center;gap:16px;padding:22px 22px 14px}
.result-header .ring{width:110px;height:110px;margin:0;flex-shrink:0}
.result-info{flex:1;min-width:0;text-align:left}
.result-info .result-level-lbl{text-align:left}
.result-info h2{text-align:left}
.result-info .msg{text-align:left;margin:0;font-size:14px;color:var(--muted)}
.result-bottom{padding:14px 22px 22px}
.result-img{width:100%;display:block;margin:0}
@media(max-width:319px){
  .result-header{flex-direction:column;align-items:center}
  .result-info{text-align:center}
  .result-info .result-level-lbl,.result-info h2,.result-info .msg{text-align:center}
}
.ring{width:150px;height:150px;margin:0 auto 6px;display:block}
.ring-bg{fill:none;stroke:var(--line);stroke-width:9}
.ring-fg{
  fill:none;stroke:var(--blue);stroke-width:9;stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:center;
  transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1);
}
.score-num{font-family:'Anton',sans-serif;font-size:36px;fill:var(--blue)}
.score-total{text-align:center;font:700 13px 'Open Sans';color:var(--muted);margin:2px 0 10px}
.hs-table thead th:last-child{text-align:right}
.result h2{
  font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(28px,7vw,40px);color:var(--blue-dark);line-height:1;margin:10px 0 6px;
}
.result .msg{color:var(--muted);font-size:14px;margin:0}

.share-lbl{font:700 12px 'Open Sans';letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);margin:0 0 12px;text-align:center}
.share-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
.share-btn{display:flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 10px;border:1.5px solid var(--line);background:var(--card);
  border-radius:10px;font:600 14px 'Open Sans';color:var(--ink);cursor:pointer;transition:.15s}
.share-btn:hover{background:var(--bg);border-color:var(--blue)}
.share-btn svg{width:18px;height:18px;flex-shrink:0}
.share-btn-fb svg{fill:#1877f2}
.share-btn-x  svg{fill:#000}
.share-btn-wa svg{fill:#25d366}
.share-btn-cp svg{fill:var(--muted)}
.replay{
  background:none;border:none;color:var(--blue);font:700 15px 'Open Sans';cursor:pointer;
  padding:8px;text-decoration:underline;
}

/* ---- loading / footer ---- */
.loading{padding:60px 20px;text-align:center;color:var(--muted)}
.footer{display:flex;justify-content:center;align-items:center;gap:10px;
  padding:18px 0 4px;color:var(--muted);font-size:12px}
.footer a{color:var(--blue);text-decoration:none}
.quiz-ver{font-size:10px;color:var(--line);letter-spacing:.04em}
.toast{
  position:fixed;left:50%;bottom:28px;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:24px;font-size:14px;
  opacity:0;pointer-events:none;transition:.25s;
}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="app">
  <div class="card" id="screen">
    <div class="loading">…</div>
  </div>
  <div class="footer">
    <a href="https://www.trumslagaren.se" target="_blank">Trumslagaren.se</a>
    <span class="quiz-ver" id="quiz-ver"></span>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ===================================================================
   1. KONFIGURATION
   WORKER = adressen till din Cloudflare Worker (utan avslutande /).
   Lämnas den tom används den inbyggda demo-datan.
   Vilket quiz som laddas styrs av ?quiz=<id> i adressen.
==================================================================== */
/* ─── Uppdatera vid varje deploy ─── */
const VERSION = "v1.7";
/* ─────────────────────────────────── */
document.getElementById("quiz-ver").textContent = VERSION;

/* Auto-resize – skickar quizets höjd till föräldrasidan (Starweb)
   så att iframen alltid är exakt lika hög som innehållet */
function notifyHeight(){
  const h = document.body.scrollHeight;
  if(window.parent !== window)
    window.parent.postMessage({type:"quiz-height", height:h}, "*");
}
const _ro = new ResizeObserver(notifyHeight);
_ro.observe(document.getElementById("app"));

const WORKER = "https://quiz.trumslagaren.workers.dev";   // <-- t.ex. "https://trumquiz.<konto>.workers.dev"
const DEFAULT_QUIZ = "trummor";
const quizId = new URLSearchParams(location.search).get("quiz") || DEFAULT_QUIZ;

/* Bilder ligger i denna mapp i repot. Cellen innehåller bara filnamnet. */
const IMG_PATH = "images/";

/* TrumQuiz-logga som visas på startskärmen (filnamn i images/-mappen). */
const LOGO = "TrumQuizz-logga.jpg";

/* ===================================================================
   2. GRÄNSSNITTSTEXTER (allt utom själva frågorna)
==================================================================== */
const UI = {
  sv:{
    sub:"Hur bra koll har du på trummor?",
    questions:"frågor", perq:"sek/fråga", start:"Starta quiz",
    choose:"Välj rätt svar", sec:"sekunder", next:"Nästa →",
    of:"av", share:"Dela ditt resultat – utmana andra att slå dig!", fb:"Dela",
    again:"Spela igen", copied:"Länk kopierad!",
    sharetext:(s,t,p,lvl)=>`Jag fick ${s}/${t} (${p}%) på Trumslagarens trumquiz – ${lvl}! Klarar du bättre? 🥁`,
    hiBtn:"Topplista", hiTitle:"Topplista", hiEmpty:"Inga poäng ännu – bli först!",
    hiRank:"#", hiName:"Namn", hiScore:"Poäng",
    hiNew:"🏆 Du tog dig in på topp 10! Grattis!", hiPts:"poäng",
    hiAlready:"Bra gjort – du presterade på topp 10-nivå! 🏆 Bara det första försöket per dag räknas på topplistan. Kom tillbaka imorgon och slå dig in!",
    hiNamePlaceholder:"Ditt namn eller alias (max 20 tecken)",
    hiSave:"Spara", hiSaved:"Sparat! 🎉", hiBack:"← Tillbaka",
    hiToday:"(idag)", hiPoints:"Tidspoäng"
  },
  en:{
    sub:"How well do you know your drums?",
    questions:"questions", perq:"sec/question", start:"Start quiz",
    choose:"Pick the right answer", sec:"seconds", next:"Next →",
    of:"of", share:"Share your result – challenge others to beat it!", fb:"Share",
    again:"Play again", copied:"Link copied!",
    sharetext:(s,t,p,lvl)=>`I scored ${s}/${t} (${p}%) on the Trumslagaren drum quiz – ${lvl}! Can you beat it? 🥁`,
    hiBtn:"Hi-score", hiTitle:"Hi-score", hiEmpty:"No scores yet – be the first!",
    hiRank:"#", hiName:"Name", hiScore:"Score",
    hiNew:"🏆 You made the top 10! Congratulations!", hiPts:"pts",
    hiAlready:"Well done – you scored at top 10 level! 🏆 Only your first attempt each day counts on the leaderboard. Come back tomorrow and claim your spot!",
    hiNamePlaceholder:"Your name or alias (max 20 chars)",
    hiSave:"Save", hiSaved:"Saved! 🎉", hiBack:"← Back",
    hiToday:"(today)", hiPoints:"Time score"
  }
};

/* ===================================================================
   3. DEMO-DATA (används om WORKER är tomt)
==================================================================== */
const DEMO = {
  config:{ titel_sv:"Trumquiz", titel_en:"Drum Quiz",
           sekunder_per_fraga:"30", blanda_fragor:"nej", blanda_alternativ:"ja" },
  questions:[
    { fraga_sv:"Vilket företag introducerade plastskinn (Mylar) på 1950-talet?",
      fraga_en:"Which company introduced Mylar plastic drumheads in the 1950s?",
      alt_a_sv:"Evans", alt_a_en:"Evans", alt_b_sv:"Aquarian", alt_b_en:"Aquarian",
      alt_c_sv:"Remo", alt_c_en:"Remo", alt_d_sv:"Ludwig", alt_d_en:"Ludwig",
      ratt:"C", bild:"",
      forklaring_sv:"Remo Belli lanserade Mylar-skinnet 1957 och förändrade branschen för alltid.",
      forklaring_en:"Remo Belli launched the Mylar head in 1957, changing the industry forever." },
    { fraga_sv:"Av vilket material tillverkas de flesta traditionella trumstockar?",
      fraga_en:"What material are most traditional drumsticks made from?",
      alt_a_sv:"Aluminium", alt_a_en:"Aluminium", alt_b_sv:"Hickory", alt_b_en:"Hickory",
      alt_c_sv:"Bambu", alt_c_en:"Bamboo", alt_d_sv:"Lönn", alt_d_en:"Maple",
      ratt:"B", bild:"", forklaring_sv:"", forklaring_en:"" },
    { fraga_sv:"Vilken trummis spelade med Led Zeppelin?",
      fraga_en:"Which drummer played with Led Zeppelin?",
      alt_a_sv:"Keith Moon", alt_a_en:"Keith Moon", alt_b_sv:"Neil Peart", alt_b_en:"Neil Peart",
      alt_c_sv:"John Bonham", alt_c_en:"John Bonham", alt_d_sv:"Buddy Rich", alt_d_en:"Buddy Rich",
      ratt:"C", bild:"", forklaring_sv:"", forklaring_en:"" },
    { fraga_sv:"Vad kallas rudimentet med mönstret RLRR LRLL?",
      fraga_en:"What rudiment has the sticking pattern RLRR LRLL?",
      alt_a_sv:"Flam", alt_a_en:"Flam", alt_b_sv:"Ratamacue", alt_b_en:"Ratamacue",
      alt_c_sv:"Single stroke roll", alt_c_en:"Single stroke roll", alt_d_sv:"Paradiddle", alt_d_en:"Paradiddle",
      ratt:"D", bild:"",
      forklaring_sv:"Paradiddlen är ett av de 40 grundläggande rudimenten.",
      forklaring_en:"The paradiddle is one of the 40 essential rudiments." },
    { fraga_sv:"Vilket land är congas ursprungligen från?",
      fraga_en:"Which country are congas originally from?",
      alt_a_sv:"Brasilien", alt_a_en:"Brazil", alt_b_sv:"Ghana", alt_b_en:"Ghana",
      alt_c_sv:"Kuba", alt_c_en:"Cuba", alt_d_sv:"Senegal", alt_d_en:"Senegal",
      ratt:"C", bild:"", forklaring_sv:"", forklaring_en:"" }
  ],
  levels:[
    { min:"0",  max:"49",  titel_sv:"På gång",    titel_en:"Getting there",
      text_sv:"Bra start – öva lite till så sitter det!", text_en:"Good start – keep practising!",
      bild:"TrumQuizz-logga.jpg", delningsid:"pagang" },
    { min:"50", max:"79",  titel_sv:"Silver",      titel_en:"Silver",
      text_sv:"Snyggt spelat – du kan dina trummor!", text_en:"Well played – you know your drums!",
      bild:"Trumquizz-silver.jpg", delningsid:"silver" },
    { min:"80", max:"100", titel_sv:"Mästare!",    titel_en:"Master!",
      text_sv:"Du borde jobba hos oss 😎🥁", text_en:"You should work for us 😎🥁",
      bild:"Trumquizz-master.jpg", delningsid:"master" }
  ]
};

/* ===================================================================
   4. TILLSTÅND
==================================================================== */
let DATA = null;
const urlLang = new URLSearchParams(location.search).get("lang");
let lang = urlLang === "en" ? "en"
         : urlLang === "sv" ? "sv"
         : (navigator.language||"sv").toLowerCase().startsWith("en") ? "en" : "sv";
let st = { i:0, score:0, timeScore:0, answered:false, timer:null, perq:30, t0:0, dur:0 };
let showExp = (()=>{ try{ return localStorage.getItem("quiz_showExp")==="1"; }catch(e){ return false; }})();

const screen = document.getElementById("screen");
const t = () => UI[lang];

/* ===================================================================
   5. DATAHÄMTNING (Workern returnerar färdig JSON, filtrerad på quiz_id)
==================================================================== */
async function loadData(){
  if(!WORKER) return DEMO;
  const res = await fetch(`${WORKER}/data?quiz=${encodeURIComponent(quizId)}`);
  if(!res.ok) throw new Error("HTTP "+res.status);
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}

/* ===================================================================
   6. HJÄLPARE
==================================================================== */
const yes = v => /^(ja|yes|true|1)$/i.test((v||"").trim());
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function imgTag(file,cls){ return file ? `<img class="${cls}" src="${IMG_PATH}${file}" alt="">` : ""; }
function L(o,key){ return o[`${key}_${lang}`] || o[`${key}_sv`] || ""; }

function buildOptions(q){
  const letters=["a","b","c","d"];
  let opts=[];
  letters.forEach(l=>{
    const txt=L(q,`alt_${l}`);
    if(txt) opts.push({ txt, correct: (q.ratt||"").trim().toLowerCase()===l });
  });
  if(yes(DATA.config.blanda_alternativ)) opts=shuffle(opts);
  return opts;
}

/* ===================================================================
   7. SKÄRMAR
==================================================================== */
function renderStart(){
  clearInterval(st.timer);
  const c=DATA.config, total=DATA.questions.length;
  screen.innerHTML=`
    <div class="start">
      ${LOGO?`<img class="start-logo" src="${IMG_PATH}${LOGO}" alt="TrumQuiz">`:""}
      <h1>${c[`titel_${lang}`]||c.titel_sv||"Quiz"}</h1>
      <p class="sub">${t().sub}</p>
      <div class="meta">
        <div><span class="num">${total}</span><span class="lbl">${t().questions}</span></div>
        <div><span class="num">${st.perq}</span><span class="lbl">${t().perq}</span></div>
      </div>
      <button class="btn-primary" id="startBtn">${t().start}</button>
      ${WORKER?`<button class="btn-scores" id="hsBtn">${t().hiBtn}</button>`:""}
      <label class="exp-toggle">
        <input type="checkbox" id="expChk"${showExp?" checked":""}>${lang==="en"?"Show explanations (when available)":"Visa förklaringar (när så finns)"}
      </label>
    </div>`;
  document.getElementById("startBtn").onclick=()=>{ st.i=0; st.score=0; st.timeScore=0; renderQuestion(); };
  if(WORKER) document.getElementById("hsBtn").onclick=renderScores;
  document.getElementById("expChk").onchange=e=>{
    showExp=e.target.checked;
    try{ localStorage.setItem("quiz_showExp",showExp?"1":"0"); }catch(e){}
  };
}

function renderQuestion(){
  const q=DATA.questions[st.i], total=DATA.questions.length;
  st.answered=false;
  const opts=buildOptions(q);
  const exp=L(q,"forklaring");

  screen.innerHTML=`
    <div class="qhead">
      <div class="progress-row">
        <div class="bar"><span style="width:${(st.i)/total*100}%"></span></div>
        <span class="counter">${st.i+1} ${t().of} ${total}</span>
      </div>
      <div class="timer-wrap"><div class="timer-bar" id="tbar"></div></div>
      <div class="timer-num" id="tnum">${st.perq} ${t().sec}</div>
    </div>
    <div class="qbody">
      ${imgTag(q.bild,"qimg")}
      <span class="tag">${t().choose}</span>
      <div class="question">${L(q,"fraga")}</div>
      <div class="options" id="opts">
        ${opts.map((o,k)=>`<button class="opt" data-k="${k}">${o.txt}</button>`).join("")}
      </div>
      <div id="after"></div>
    </div>`;

  const buttons=[...screen.querySelectorAll(".opt")];
  buttons.forEach(b=> b.onclick=()=>answer(buttons,opts,parseInt(b.dataset.k),exp));
  startTimer(buttons,opts,exp);
}

function startTimer(buttons,opts,exp){
  const bar=document.getElementById("tbar"), num=document.getElementById("tnum");
  st.t0=Date.now(); st.dur=st.perq*1000;
  const dur=st.dur, t0=st.t0;
  clearInterval(st.timer);
  st.timer=setInterval(()=>{
    const left=Math.max(0,dur-(Date.now()-t0)), frac=left/dur;
    bar.style.width=(frac*100)+"%";
    bar.style.background = frac>.5?"var(--green)" : frac>.2?"var(--orange)":"var(--red)";
    num.textContent=Math.ceil(left/1000)+" "+t().sec;
    if(left<=0){ clearInterval(st.timer); if(!st.answered) reveal(buttons,opts,-1,exp); }
  },50);
}

function answer(buttons,opts,k,exp){
  if(st.answered) return;
  clearInterval(st.timer);
  reveal(buttons,opts,k,exp);
}

function reveal(buttons,opts,chosen,exp){
  st.answered=true;
  buttons.forEach((b,k)=>{
    b.disabled=true;
    if(opts[k].correct) b.classList.add("correct");
    else if(k===chosen) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  if(chosen>=0 && opts[chosen].correct){
    st.score++;
    const secsLeft=Math.max(0, st.dur-(Date.now()-st.t0))/1000;
    st.timeScore+=Math.round(100*(secsLeft+1)/(st.perq+1));
  }

  const after=document.getElementById("after");
  if(exp && showExp){
    after.innerHTML=`<div class="explain">${exp}</div>
      <div class="next-row"><button class="btn-next" id="nextBtn">${t().next}</button></div>`;
    document.getElementById("nextBtn").onclick=advance;
  } else {
    setTimeout(advance,1400);
  }
}

function advance(){
  st.i++;
  if(st.i>=DATA.questions.length) renderResult();
  else renderQuestion();
}

function renderResult(){
  clearInterval(st.timer);
  const total=DATA.questions.length;
  const pct=Math.round(st.score/total*100);
  const lvl=DATA.levels.find(l=>pct>=(+l.min) && pct<=(+l.max)) || DATA.levels[DATA.levels.length-1] || {};
  const lvlTitle=L(lvl,"titel"), lvlText=L(lvl,"text");

  const R=52, C=2*Math.PI*R;
  screen.innerHTML=`
    <div class="result">
      <div class="result-header">
        <svg class="ring" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="${R}"></circle>
          <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="${R}"
                  stroke-dasharray="${C}" stroke-dashoffset="${C}"></circle>
          <text class="score-num" x="60" y="60" text-anchor="middle" dominant-baseline="central">${pct}%</text>
        </svg>
        <div class="result-info">
          <p class="result-level-lbl">${lang==="en"?"Level":"Nivå"}</p>
          <h2>${lvlTitle}</h2>
          <p class="msg">${lvlText}</p>
        </div>
      </div>
      ${imgTag(lvl.bild,"result-img")}
      <div class="result-bottom">
        <p class="score-pts"><span class="score-pts-num">${st.timeScore}</span> ${t().hiPts}</p>
        <p class="share-lbl">${t().share}</p>
        <div class="share-row">
          <button class="share-btn share-btn-fb" id="fbBtn"><svg viewBox="0 0 24 24"><path d="M24 12c0-6.6-5.4-12-12-12S0 5.4 0 12c0 6 4.4 11 10.1 11.9v-8.4H7.1V12h3V9.4c0-3 1.8-4.6 4.5-4.6 1.3 0 2.7.2 2.7.2v2.9h-1.5c-1.5 0-2 .9-2 1.9V12h3.3l-.5 3.5h-2.8v8.4C19.6 23 24 18 24 12z"/></svg>Facebook</button>
          <button class="share-btn share-btn-x"  id="xBtn"><svg viewBox="0 0 24 24"><path d="M18.9 1.2h3.7l-8 9.1L24 22.8h-7.4l-5.8-7.5-6.6 7.5H.5l8.5-9.7L0 1.2h7.6l5.2 6.9 6.1-6.9zm-1.3 19.4h2L6.5 3.3H4.4l13.2 17.3z"/></svg>X</button>
          <button class="share-btn share-btn-wa" id="waBtn"><svg viewBox="0 0 24 24"><path d="M.1 24l1.7-6.2A11.9 11.9 0 1 1 12 24a11.9 11.9 0 0 1-5.7-1.5L.1 24zM6.6 20l.4.2a9.9 9.9 0 1 0-3.4-3.4l.2.4-1 3.7 3.8-.9zM18 14.3c-.2-.4-.8-.6-1.7-1-.2-.1-1.3-.6-1.5-.7-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a8 8 0 0 1-2.4-1.5 9 9 0 0 1-1.6-2c-.2-.3 0-.4.1-.5l.4-.5c.1-.2.1-.3.2-.5s0-.3 0-.5l-.7-1.6c-.2-.4-.4-.4-.5-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.3s1 2.7 1.1 2.9c.1.2 2 3 4.8 4.2 1.8.7 2.5.8 3.3.7.5-.1 1.5-.6 1.7-1.2.2-.6.2-1.1.2-1.2z"/></svg>WhatsApp</button>
          <button class="share-btn share-btn-cp" id="cpBtn"><svg viewBox="0 0 24 24"><path d="M3.9 12a3 3 0 0 1 3-3h4V7h-4a5 5 0 0 0 0 10h4v-2h-4a3 3 0 0 1-3-3zm4 1h8v-2h-8v2zm9-6h-4v2h4a3 3 0 0 1 0 6h-4v2h4a5 5 0 0 0 0-10z"/></svg>${lang==="en"?"Link":"Länk"}</button>
        </div>
        <button class="replay" id="replay">${t().again}</button>
        <div id="hiscore-entry"></div>
      </div>
    </div>`;

  requestAnimationFrame(()=>{
    document.getElementById("ringFg").style.strokeDashoffset = C*(1-pct/100);
  });

  const shareText=t().sharetext(st.score,total,pct,lvlTitle);
  const shareUrl = (WORKER && lvl.delningsid)
    ? `${WORKER}/dela?quiz=${encodeURIComponent(quizId)}&lvl=${encodeURIComponent(lvl.delningsid)}&s=${st.score}&t=${total}&lang=${lang}`
    : location.href;
  document.getElementById("fbBtn").onclick=()=>doShare(shareText,shareUrl,
    `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`);
  document.getElementById("xBtn").onclick=()=>doShare(shareText,shareUrl,
    `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`);
  document.getElementById("waBtn").onclick=()=>doShare(shareText,shareUrl,
    `https://wa.me/?text=${encodeURIComponent(shareText+" "+shareUrl)}`);
  document.getElementById("cpBtn").onclick=()=>{ navigator.clipboard.writeText(shareUrl); toast(t().copied); };
  document.getElementById("replay").onclick=renderStart;

  if(WORKER) checkHiScoreEntry(st.timeScore, lvl.delningsid||"");
}

/* ===================================================================
   8. DELNING
==================================================================== */
/* På mobil: navigator.share öppnar telefonens inbyggda dela-meny (välj FB, WA osv.).
   På desktop: faller tillbaka på plattformsspecifikt popupfönster.
   OBS: iframe-taggen på Starweb-sidan behöver allow="web-share" för Chrome Android. */
function doShare(text, url, fallback){
  if(navigator.share){
    navigator.share({ title:text, url }).catch(()=> window.open(fallback,"_blank"));
  } else {
    window.open(fallback,"_blank","width=600,height=500,noopener");
  }
}
let toastTimer;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove("show"),2000);
}

/* ===================================================================
   9. SPRÅK + INIT
==================================================================== */
function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  renderStart();
}
/* ===================================================================
   10. HI-SCORE
==================================================================== */
function hsDay(){ return new Date().toISOString().slice(0,10); }
function hsPlayed(){ return localStorage.getItem(`hs_${quizId}_${hsDay()}`)=="1"; }
function hsMarkPlayed(){ localStorage.setItem(`hs_${quizId}_${hsDay()}`,"1"); }
function escH(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function fetchScores(){
  const r=await fetch(`${WORKER}/scores?quiz=${encodeURIComponent(quizId)}`);
  if(!r.ok) return [];
  return (await r.json()).scores||[];
}

async function checkHiScoreEntry(ts, levelId){
  if(!WORKER) return;
  const isFirst=!hsPlayed();
  try{
    const scores=await fetchScores();
    const qualifies=scores.length<10||(ts>(scores[scores.length-1]?.score??-1));
    if(!qualifies) return;

    if(!isFirst){
      /* Kvalat in men redan spelat idag – liten notis under resultatet */
      const el=document.getElementById("hiscore-entry");
      if(el) el.innerHTML=`<div class="hs-entry"><p class="hs-msg" style="font-size:13px">${t().hiAlready}</p></div>`;
      return;
    }

    showHiScoreModal(ts, levelId);
  }catch(e){}
}

function showHiScoreModal(ts, levelId){
  const skip=lang==="en"?"Skip":"Hoppa över";
  const bd=document.createElement("div");
  bd.className="hs-modal-backdrop";
  bd.innerHTML=`
    <div class="hs-modal">
      <div class="hs-modal-icon">🏆</div>
      <p class="hs-modal-title">${t().hiNew.replace("🏆 ","")}</p>
      <p class="hs-modal-pts">${ts} ${t().hiPts}</p>
      <input class="hs-input" id="hsModalName" maxlength="20"
             placeholder="${t().hiNamePlaceholder}" autocomplete="off">
      <button class="btn-primary" id="hsModalSave" style="margin-top:4px">${t().hiSave}</button>
      <p class="hs-modal-err" id="hsModalErr"></p>
      <button class="hs-modal-skip" id="hsModalSkip">${skip}</button>
    </div>`;
  document.body.appendChild(bd);
  setTimeout(()=>document.getElementById("hsModalName")?.focus(),100);

  const close=()=>bd.remove();
  document.getElementById("hsModalSkip").onclick=close;
  bd.onclick=e=>{ if(e.target===bd) close(); };

  document.getElementById("hsModalSave").onclick=async()=>{
    const name=(document.getElementById("hsModalName").value||"").trim();
    if(!name) return;
    const btn=document.getElementById("hsModalSave");
    const err=document.getElementById("hsModalErr");
    btn.disabled=true; err.textContent="";
    try{
      const r=await fetch(`${WORKER}/score`,{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({quiz_id:quizId,name,score:ts,lang,level:levelId||""})});
      if(r.ok){
        hsMarkPlayed();
        close();
        renderScores();
      } else {
        const d=await r.json();
        err.textContent=escH(d.error||"Fel");
        btn.disabled=false;
      }
    }catch(e){ btn.disabled=false; }
  };
}

function levelTitle(delningsid){
  const lv=(DATA?.levels||[]).find(l=>l.delningsid===delningsid);
  return lv ? L(lv,"titel") : (delningsid||"");
}

function renderScores(){
  screen.innerHTML=`<div class="hs-list"><p class="hs-loading">…</p></div>`;
  fetchScores().then(scores=>{
    screen.innerHTML=`
      <div class="hs-list">
        <h2 class="hs-title">${t().hiTitle} – ${DATA.config[`titel_${lang}`]||DATA.config.titel_sv||""}</h2>
        <table class="hs-table">
          <thead><tr><th>${t().hiRank}</th><th>${t().hiName}</th><th class="hs-pts">${t().hiScore}</th></tr></thead>
          <tbody>${scores.length?scores.map((s,i)=>`
            <tr class="${s.today?"hs-today":""}">
              <td class="hs-rank">${i+1}</td>
              <td class="hs-name">${escH(s.name)}${s.level?`<span class="hs-level hs-level-${escH(s.level)}">${escH(levelTitle(s.level))}</span>`:""}${s.today?` <span class="hs-you">${t().hiToday}</span>`:""}</td>
              <td class="hs-pts">${s.score}</td>
            </tr>`).join(""):
            `<tr><td colspan="3" class="hs-empty">${t().hiEmpty}</td></tr>`}
          </tbody>
        </table>
        <button class="btn-back" id="hsBackBtn">${t().hiBack}</button>
      </div>`;
    document.getElementById("hsBackBtn").onclick=renderStart;
  }).catch(()=>{
    screen.innerHTML=`<div class="hs-list"><p class="hs-empty">${t().hiEmpty}</p>
      <button class="btn-back" id="hsBackBtn">${t().hiBack}</button></div>`;
    document.getElementById("hsBackBtn").onclick=renderStart;
  });
}


(async function init(){
  try{
    DATA=await loadData();
    st.perq=parseInt(DATA.config.sekunder_per_fraga)||30;
    if(yes(DATA.config.blanda_fragor)) DATA.questions=shuffle(DATA.questions);
    setLang(lang);
  }catch(e){
    screen.innerHTML=`<div class="loading">Kunde inte ladda frågorna.<br>Kontrollera Sheets-delning och flik-namn.</div>`;
    console.error(e);
  }
})();
</script>
</body>
</html>
